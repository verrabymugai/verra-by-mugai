<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&amp;display=swap');
            .text-aarthi-horiz {
                font-family: 'Alex Brush', cursive, Georgia, serif;
                font-size: 38px;
                fill: #ffffff;
            }
            .text-homes-horiz {
                font-family: 'Alex Brush', cursive, Georgia, serif;
                font-size: 32px;
                fill: #fcae1e;
            }
            .line-divider-horiz {
                stroke: #ffffff;
                stroke-width: 2;
                stroke-linecap: round;
            }
            .vert-divider {
                stroke: #ffffff;
                stroke-width: 1.5;
                stroke-opacity: 0.3;
                stroke-linecap: round;
            }
        </style>
    </defs>

    <!-- Emblem Group (Scaled & Positioned) -->
    <g transform="translate(15, 0) scale(0.5)">
        <!-- Left Crescent (White) -->
        <path d="M 120 30 A 70 70 0 0 0 120 170 A 58 58 0 0 1 120 30" fill="#ffffff" />
        
        <!-- Right Crescent (Gold) -->
        <path d="M 80 170 A 70 70 0 0 0 80 30 A 58 58 0 0 1 80 170" fill="#fcae1e" />
        
        <!-- Stylized Chevron "A" (Gold) -->
        <path d="M 72 128 L 100 62 L 128 128" fill="none" stroke="#fcae1e" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Vertical Divider between emblem and text -->
    <line x1="140" y1="20" x2="140" y2="80" class="vert-divider" />

    <!-- Text Group -->
    <text x="160" y="44" class="text-aarthi-horiz">Aarthi</text>
    <line x1="160" y1="52" x2="270" y2="52" class="line-divider-horiz" />
    <text x="160" y="84" class="text-homes-horiz">Homes</text>
</svg>
